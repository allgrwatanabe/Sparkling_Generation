<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>炭酸ディスペンサー コスト削減シミュレーター</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <div id="screen-input">
    <h2>コスト削減シミュレーター</h2>
    <div class="card">
      <div class="field">
        <label>1日の使用量（500ml換算）</label>
        <div class="slider-row">
          <input type="range" id="rangeUsage" min="1" max="100" value="10" step="1">
          <input type="number" class="num-box" id="numUsage" min="1" max="100" value="10">
          <span class="slider-unit">本</span>
        </div>
      </div>
      <div class="field">
        <label>ペットボトル1本の仕入値（円）</label>
        <input type="number" id="bottlePrice" value="82" min="1">
      </div>
      <div class="field">
        <label>ディスペンサー導入費用</label>
        <select id="dispenserCost">
          <option value="330000">330,000円（キャンペーン）</option>
          <option value="440000">440,000円（通常モデル）</option>
          <option value="550000">550,000円（ハイエンド）</option>
          <option value="custom">その他（手入力）</option>
        </select>
        <div id="customWrap">
          <input type="number" id="customCost" placeholder="例：480000" min="1">
          <p class="custom-hint">半角数字で円単位入力（例：480000）</p>
        </div>
      </div>
      <button class="btn-primary" id="btnCalc">測定する</button>
    </div>
  </div>

  <div id="screen-result" class="hidden">
    <h2>シミュレーション結果</h2>
    <div class="card">
      <div class="summary-row"><span class="slabel">1日の使用量</span><span class="sval" id="r-usage">-</span></div>
      <div class="summary-row"><span class="slabel">ペットボトル仕入値</span><span class="sval" id="r-price">-</span></div>
      <div class="summary-row"><span class="slabel">導入費用</span><span class="sval" id="r-cost">-</span></div>
    </div>
    <div class="card">
      <div class="result-block">
        <div class="rlabel">月間コスト削減額（純利益増）</div>
        <div class="rvalue" id="r-savings">-</div>
      </div>
      <div class="result-block">
        <div class="rlabel">初期費用の投資回収期間</div>
        <div class="rvalue" id="r-roi">-</div>
      </div>
      <p class="note">
        ※ガス代（約5.45円/本）＋フィルター代（月額約1,412円）含む<br>
        ※月30日稼働として算出
      </p>
      <button class="btn-back" id="btnBack">◀ 条件を変えて再計算</button>
    </div>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
