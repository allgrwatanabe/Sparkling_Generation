<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>炭酸ディスペンサー 月間コスト削減シミュレーター</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <div id="screen-input">
    <h2>月間コスト削減シミュレーター</h2>
    <p class="subtitle">炭酸ディスペンサーを導入したら毎月いくら得になるか</p>
    <div class="card">
      <div class="field">
        <label>1日の炭酸水使用量（500ml換算）</label>
        <div class="slider-row">
          <input type="range" id="rangeUsage" min="1" max="100" value="10" step="1">
          <input type="number" class="num-box" id="numUsage" min="1" max="100" value="10">
          <span class="slider-unit">本</span>
        </div>
      </div>
      <div class="field">
        <label>現在のペットボトル仕入値（1本あたり）</label>
        <input type="number" id="bottlePrice" value="82" min="1">
      </div>
      <button class="btn-primary" id="btnCalc">削減額を見る</button>
    </div>
  </div>

  <div id="screen-result" class="hidden">
    <h2>月間コスト削減シミュレーター</h2>
    <p class="subtitle">試算結果</p>

    <div class="merit-card">
      <div class="merit-label">毎月の純利益アップ額</div>
      <div class="merit-value" id="r-savings">-</div>
      <div class="merit-sub">ディスペンサー導入後、毎月この金額が浮きます</div>
    </div>

    <div class="breakdown">
      <div class="breakdown-row">
        <span>現在のコスト（月）</span>
        <span id="r-bottle">-</span>
      </div>
      <div class="breakdown-row">
        <span>導入後のコスト（月）</span>
        <span id="r-dispenser">-</span>
      </div>
      <div class="breakdown-row diff">
        <span>削減額</span>
        <span id="r-diff">-</span>
      </div>
    </div>

    <div class="card">
      <div class="summary-row"><span>1日の使用量</span><span id="r-usage">-</span></div>
      <div class="summary-row"><span>現在の仕入値</span><span id="r-price">-</span></div>
    </div>

    <div class="cta-box">
      <p>導入費用・回収期間など<br>詳しいご提案はお気軽にご相談ください</p>
    </div>

    <p class="note">※ガス代（約5.45円/本）＋フィルター代（月額約917円）含む／月30日稼働として算出</p>
    <button class="btn-back" id="btnBack">◀ 条件を変えて再計算</button>
  </div>

</div>
<script src="app.js"></script>
</body>
</html>
